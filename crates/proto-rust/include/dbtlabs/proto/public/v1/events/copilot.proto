syntax = "proto3";

package v1.public.events.copilot;
option go_package = "github.com/dbt-labs/proto-golang/v1/public/events/copilot";

import "dbtlabs/proto/public/v1/common/vortex_options.proto";
import "dbtlabs/proto/public/v1/common/vortex_telemetry_contexts.proto";
import "dbtlabs/proto/public/v1/events/vortex.proto";


// As of 2025/05, enums are not handled properly with Vortex
// so we document possible values in comments but use string fields.

// Possible values for CopilotGenerationComplete.key_type:
//   "KEY_TYPE_OPENAI_DBT_MANAGED"
//   "KEY_TYPE_BYOK_OPENAI"
//   "KEY_TYPE_BYOK_AZURE_OPENAI"
//   "KEY_TYPE_BYOK_ANTHROPIC"

// Fired when an AI code generation request completes (success or failure).
// Covers all Copilot actions: generate docs, tests, semantic models, metrics,
// inline SQL, text-to-SQL, and agent runs.
message CopilotGenerationComplete {
  option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;
  option (v1.public.common.vortex_enabled) = true;

  // Server enrichment for this event
  v1.events.vortex.VortexMessageEnrichment enrichment = 1;

  // dbt Cloud context (account_id, user_id, project_id, etc.)
  v1.public.common.vortex_telemetry_contexts.VortexTelemetryDbtCloudContext ctx = 2;

  // Unique identifier for this generation request; natural dedup key
  string copilot_request_id = 3;

  // Conversation thread for multi-turn correlation
  string thread_id = 4;

  // LLM provider (e.g. "openai", "azure_openai", "anthropic")
  string model_provider = 5;

  // Model identifier (e.g. "gpt-4o", "claude-sonnet-4-20250514")
  string model_version = 6;

  // Client application name (e.g. "studio", "vscode", "cloud-cli")
  string app_name = 7;

  // What triggered the generation (e.g. "user", "auto")
  string copilot_trigger = 8;

  // Which Copilot action ran (e.g. "generate_documentation", "text_to_sql", "agent")
  string copilot_action = 9;

  // Whether the generation encountered an error
  bool has_error = 10;

  // Error message if has_error is true
  optional string error_message = 11;

  // Whether the project has a custom style guide configured
  bool has_custom_styleguide = 12;

  // Prompt template version hash
  string prompt_version = 13;

  // Prompt template name
  string prompt_name = 14;

  // Prompt template variation (e.g. A/B test variant)
  string prompt_variation = 15;

  // Input tokens sent to the LLM
  optional int64 tokens_in_prompt = 16;

  // Output tokens received from the LLM
  optional int64 tokens_in_response = 17;

  // Total tokens (input + output)
  optional int64 tokens_total = 18;

  // End-to-end latency in milliseconds
  optional int64 latency_ms = 19;

  // IDE/develop session identifier
  optional string ide_session_id = 20;

  // API key type; see key_type values documented above
  string key_type = 21;

  // Input tokens where prompt cache was created (cache miss, Anthropic)
  optional int64 cache_creation_input_tokens = 22;

  // Input tokens served from prompt cache (cache hit)
  optional int64 cache_read_input_tokens = 23;

  // Chain-of-thought tokens not included in the response
  optional int64 reasoning_output_tokens = 24;

  // Time to first token in milliseconds. Unset when not streaming.
  optional int64 first_token_ms = 25;
}


// Fired once per LLM call within an agent loop.
// Allows per-call token and latency attribution when a single copilot_request_id
// triggers multiple LLM invocations (e.g. a dev agent loop).
// Links back to the parent CopilotGenerationComplete via copilot_request_id.
message CopilotLlmCall {
  option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;
  option (v1.public.common.vortex_enabled) = true;

  // Server enrichment for this event
  v1.events.vortex.VortexMessageEnrichment enrichment = 1;

  // dbt Cloud context (account_id, user_id, project_id, etc.)
  v1.public.common.vortex_telemetry_contexts.VortexTelemetryDbtCloudContext ctx = 2;

  // Identifies the parent agent run; foreign key to CopilotGenerationComplete
  string copilot_request_id = 3;

  // Conversation thread for multi-turn correlation
  string thread_id = 4;

  // LLM provider (e.g. "openai", "azure_openai", "anthropic")
  string model_provider = 5;

  // Model identifier (e.g. "gpt-4o", "claude-sonnet-4-20250514")
  string model_version = 6;

  // Client application name (e.g. "studio", "vscode", "cloud-cli")
  string app_name = 7;

  // Which Copilot action this call belongs to (e.g. "run_langgraph_agent")
  string copilot_action = 8;

  // API key type used for this call. String representation of the
  // DbtCopilotGenerationComplete.KeyType enum (private proto); valid values
  // are the same as CopilotGenerationComplete.key_type documented above.
  // Enums are not yet handled properly in Vortex, so the enum name is
  // serialised to a string at the call site rather than using an enum field.
  string key_type = 9;

  // Zero-based index of this LLM call within the agent loop
  optional int32 call_index = 10;

  // Input tokens sent to the LLM for this call
  optional int64 tokens_input = 11;

  // Output tokens received from the LLM for this call
  optional int64 tokens_output = 12;

  // Total tokens (input + output)
  optional int64 tokens_total = 13;

  // Latency of this specific LLM call in milliseconds
  optional int64 latency_ms = 14;

  // Input tokens where prompt cache was created (cache miss, Anthropic)
  optional int64 cache_creation_input_tokens = 15;

  // Input tokens served from prompt cache (cache hit)
  optional int64 cache_read_input_tokens = 16;

  // Chain-of-thought tokens not included in the response
  optional int64 reasoning_output_tokens = 17;

  // Time to first token in milliseconds. Unset when not streaming.
  optional int64 first_token_ms = 18;
}


// Possible values for CopilotUserAcceptance.response_type:
//   "accepted"  - user accepted the suggestion as-is
//   "rejected"  - user rejected the suggestion
//   "edited"    - user modified the suggestion before accepting

// Fired when a user responds to a Copilot suggestion.
message CopilotUserAcceptance {
  option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;
  option (v1.public.common.vortex_enabled) = true;

  // Server enrichment for this event
  v1.events.vortex.VortexMessageEnrichment enrichment = 1;

  // dbt Cloud context
  v1.public.common.vortex_telemetry_contexts.VortexTelemetryDbtCloudContext ctx = 2;

  // The generation request this acceptance responds to
  string copilot_request_id = 3;

  // Conversation thread for multi-turn correlation
  string thread_id = 4;

  // User's decision; see response_type values documented above
  string response_type = 5;

  // Optional free-text feedback comment from the user. Unset when no feedback provided.
  optional string feedback_text = 6;
}
