message ExtensionCompareFinished {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // anonymized identifier for this compare session
    string compare_id = 4;

    // duration of the compare operation in milliseconds
    int64 duration_ms = 5;

    // whether the compare operation completed successfully
    bool compare_success = 6;

    // Deprecated: use failure_mode and error_message instead
    string failure_reason = 7 [deprecated = true];

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 8;

    // UUID to uniquely identify the event
    string event_id = 9;

    // categorizes the type of failure that occurred
    v1.public.fields.vscode_types.CompareFailureMode failure_mode = 10;

    // detailed error message or logs from the failed operation
    string error_message = 11;

    // number of result rows reported by the compare artifact
    uint32 artifact_results_count = 12;

    // whether the compare artifact contained a project section
    bool artifact_has_project = 13;

    // dbt schema version reported by the compare artifact (e.g., the manifest schema URL/version)
    string artifact_dbt_schema_version = 14;

    // invocation_id reported by the compare artifact (correlates to the dbt run that produced it)
    string artifact_invocation_id = 15;
}

// Emitted when the user opens (drills into) a single row in the Compare panel results table.
// Pairs with ExtensionCompareStarted/Finished via compare_id.
message ExtensionCompareRowOpened {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // anonymized identifier for the compare session this row belongs to
    string compare_id = 4;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 5;

    // UUID to uniquely identify the event
    string event_id = 6;

    // category of diff row that was opened.
    // One of: 'value_diff' | 'added_record' | 'removed_record' | 'non_unique_record' | 'unknown'.
    // Kept as a string for forward-compat (no enum needed today).
    string diff_type = 7;
}

