// Emitted if the user starts the registration flow. There are several UI affordances to do this.
message ExtensionRegisterStarted {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 4;

    // UUID to uniquely identify the event
    string event_id = 5;

    // which registration path will be used
    v1.public.fields.vscode_types.RegistrationTriggerMethod trigger_method = 6;

    // identifier to correlate related registration events (matches RegisterClicked)
    string correlation_id = 7;
}

// In vscode, extensions cannot automatically open external URLs
// Instead, vscode shows the user a modal with the URL
// The user can pick Open, Trust Domain, Copy, or Cancel
// Open or Trust Domain result in the URL opening, and url_opened will be true
// Cancel or Copy result in url_opened false
// If the user copied the URL, they may paste it into a browser to continue registration
message ExtensionRegistrationUrlAttempted {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 4;

    // UUID to uniquely identify the event
    string event_id = 5;

    // whether the user opened the URL (Open/Trust = true, Cancel/Copy = false)
    bool url_opened = 6;

    // whether oauth parameters were included in the URL
    bool oauth_params_included = 7;

    // identifier to correlate related registration events (matches RegisterClicked)
    string correlation_id = 8;
}

// Emitted when the user successfully completes registration
message ExtensionRegistrationCompleted {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 4;

    // UUID to uniquely identify the event
    string event_id = 5;

    // the actual registration method used
    v1.public.fields.vscode_types.RegistrationMethod registration_method = 6;

    // duration of the registration flow in milliseconds
    int64 duration_ms = 7;

    // identifier to correlate related registration events (matches RegisterClicked)
    string correlation_id = 8;

    // dbt Cloud account ID the user registered with
    string account_id = 9;

    // dbt Cloud user ID for the registered user
    string user_id = 10;

    // dbt Cloud hostname (e.g., cloud.getdbt.com)
    string account_host = 11;
}

// Once a user starts registration, they must complete it within 10 minutes
// After 10 minutes, the auth server shuts down and we emit this event
message ExtensionRegistrationTimedOut {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 4;

    // UUID to uniquely identify the event
    string event_id = 5;

    // the registration trigger method that timed out (dbt_cloud.yml or web)
    v1.public.fields.vscode_types.RegistrationTriggerMethod trigger_method = 6;

    // duration until timeout in milliseconds
    int64 timeout_duration_ms = 7;

    // identifier to correlate related registration events (matches RegisterClicked)
    string correlation_id = 8;
}

// Emitted when an error occurs during registration
// These are most likely to be caused by issues in code (bugs, unanticipated cases, regressiones)
message ExtensionRegistrationErrored {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 4;

    // UUID to uniquely identify the event
    string event_id = 5;

    // the registration method that errored (use UNSPECIFIED if not yet known)
    v1.public.fields.vscode_types.RegistrationMethod registration_method = 6;

    // type/category of error that occurred
    string error_type = 7;

    // sanitized error message (no PII)
    string error_message = 8;

    // duration until error in milliseconds
    int64 duration_ms = 9;

    // identifier to correlate related registration events (matches RegisterClicked)
    string correlation_id = 10;
}

// Emitted when the user clicks a control to begin registration
// Used to correlate subsequent registration events with the originating click
message ExtensionRegisterClicked {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 4;

    // UUID to uniquely identify the event
    string event_id = 5;

    // UI element that was clicked to start registration (e.g., status bar, banner, extension info)
    string target = 6;

    // identifier to correlate related registration events
    string correlation_id = 7;
}

message ExtensionModelDocsPanelOpened {
    option (v1.public.common.vortex_enabled) = true;
    option (v1.public.common.vortex_namespace) = VORTEX_ICEBERG_NAMESPACE_TELEMETRY;

    v1.events.vortex.VortexMessageEnrichment enrichment = 1;

    v1.public.fields.vscode_types.Editor editor = 2;
    v1.public.fields.vscode_types.User user = 3;

    // the anonymous user id stored at ~/.dbt/.user.yml
    string dbt_local_cookie_user_id = 4;

    // UUID generated per panel render; joins all 4 Model Docs events for one render
    string correlation_id = 5;

    // md5 hash of the dbt project name (anonymized) — same hash as ExtensionLspCompileStart.project_id
